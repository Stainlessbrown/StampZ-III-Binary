name: Build Release Bundles

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual triggering
    inputs:
      version:
        description: 'Release version (e.g., v3.0.4)'
        required: true
        default: 'v3.0.4'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build with PyInstaller (onedir)
      run: |
        python -m PyInstaller --clean --noconfirm stampz.spec
        Write-Host "Build completed. Checking dist directory:"
        Get-ChildItem dist\StampZ-III
    
    - name: Download VC++ Redistributable
      run: |
        New-Item -Path "dist\StampZ-III\vcredist" -ItemType Directory -Force
        $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
        $output = "dist\StampZ-III\vcredist\vc_redist.x64.exe"
        try {
            Invoke-WebRequest -Uri $url -OutFile $output
            Write-Host "Downloaded VC++ Redistributable"
        } catch {
            Write-Host "Could not download VC++ Redistributable: $_"
        }
    
    - name: Install Inno Setup
      run: |
        choco install innosetup -y --no-progress
    
    - name: Build installer with Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" stampz_installer.iss
        $installer = Get-Item "dist\StampZ-III-*-Setup.exe"
        Write-Host "Installer created: $($installer.Name) ($([math]::Round($installer.Length / 1MB, 1)) MB)"
    
    - name: Upload Windows installer
      uses: actions/upload-artifact@v6
      with:
        name: StampZ-Windows-x64-Setup
        path: dist/StampZ-III-*-Setup.exe
        retention-days: 90

  build-linux:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller tifffile
    
    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --clean stampz.spec
        echo "Linux build completed. Checking dist directory:"
        ls -la dist/
    
    - name: Create Linux archive
      run: |
        cd dist
        if [ -d "StampZ-III" ]; then
          tar -czf "StampZ-Linux-x64.tar.gz" "StampZ-III"
        else
          echo "ERROR: dist/StampZ-III not found!"
          ls -la
          exit 1
        fi
        echo "Archive created:"
        ls -lh StampZ-Linux-x64.tar.gz
    
    - name: Upload Linux bundle
      uses: actions/upload-artifact@v6
      with:
        name: StampZ-Linux-x64
        path: dist/StampZ-Linux-x64.tar.gz
        retention-days: 90

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Create macOS bundle
      run: |
        pyinstaller --onedir --windowed \
          --add-data "data:data" \
          --add-data "templates:templates" \
          --collect-all="matplotlib" \
          --collect-all="pandas" \
          --collect-all="numpy" \
          --collect-all="PIL" \
          --hidden-import="matplotlib.backends.backend_tkagg" \
          --hidden-import="pandas._libs.tslibs.base" \
          --exclude-module="IPython" \
          --exclude-module="jupyter" \
          --name="StampZ" \
          main.py
    
    - name: Create macOS documentation
      run: |
        cat > dist/StampZ/README.txt << 'EOF'
        # StampZ for macOS

        ## Quick Start
        1. Extract this archive
        2. Drag StampZ.app to Applications folder (optional)
        3. Right-click StampZ.app → Open (first time only)
        4. Click "Open" in the security dialog

        ## Security Note
        macOS will show a security warning the first time you run StampZ.
        This is normal for unsigned applications. Click "Open" to proceed.

        ## Features
        - Complete stamp analysis toolkit
        - Ternary plot visualization
        - Spectral analysis tools
        - Self-contained - no additional installations needed

        Built for macOS 10.14+ (Intel and Apple Silicon)
        EOF
    
    - name: Create macOS archive
      run: |
        cd dist
        zip -r "StampZ-macOS-Universal.zip" "StampZ" -x "*.DS_Store"
    
    - name: Upload macOS bundle
      uses: actions/upload-artifact@v6
      with:
        name: StampZ-macOS-Universal
        path: dist/StampZ-macOS-Universal.zip
        retention-days: 90

  create-release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Windows installer
      uses: actions/download-artifact@v7
      with:
        name: StampZ-Windows-x64-Setup
    
    - name: Download macOS bundle  
      uses: actions/download-artifact@v7
      with:
        name: StampZ-macOS-Universal
    
    - name: Download Linux bundle
      uses: actions/download-artifact@v7
      with:
        name: StampZ-Linux-x64
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        name: StampZ ${{ github.event.inputs.version || github.ref_name }}
        body: |
          ## StampZ ${{ github.event.inputs.version || github.ref_name }}
          
          **Ready-to-run — no Python or other dependencies required!**
          
          ### Windows
          - Download `StampZ-III-*-Setup.exe`
          - Run the installer (you may need to click "More info" → "Run anyway" on the SmartScreen prompt)
          - Launch StampZ from the Start Menu or Desktop shortcut
          - The installer handles VC++ Runtime if needed
          - Works on Windows 10/11 (64-bit)
          
          ### macOS
          - Download `StampZ-macOS-Universal.zip`
          - Extract and run `StampZ-III.app`
          - Right-click → Open (first time only to bypass Gatekeeper)
          - Works on macOS 10.14+ (Intel & Apple Silicon)
          
          ### Linux
          - Download `StampZ-Linux-x64.tar.gz`
          - Extract: `tar -xzf StampZ-Linux-x64.tar.gz`
          - Run: `./StampZ-III/StampZ-III`
          - Works on Ubuntu 22.04+, Linux Mint 22, and similar distributions
          
          ### Upgrading
          - **Windows**: Just run the new installer — it upgrades in place automatically
          - **macOS**: Replace the old .app with the new one
          - **Linux**: Replace the old folder with the new one
        files: |
          StampZ-III-*-Setup.exe
          StampZ-macOS-Universal.zip
          StampZ-Linux-x64.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
