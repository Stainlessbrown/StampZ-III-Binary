name: Build Release Bundles

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v3.1.7)'
        required: true
        default: 'v3.1.7'

jobs:
  setup-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
    - name: Determine tag
      id: get-tag
      run: echo "tag=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

    - name: Create draft release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ github.event.inputs.version || github.ref_name }}"
        gh release delete "$TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true
        gh release create "$TAG" \
          --repo ${{ github.repository }} \
          --draft \
          --title "StampZ $TAG" \
          --notes "Ready-to-run builds for Windows, macOS (Apple Silicon), and Linux. See README for installation instructions."

  build-windows:
    needs: setup-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller tifffile

    - name: Build with PyInstaller (onedir)
      run: |
        python -m PyInstaller --clean --noconfirm stampz.spec
        Write-Host "Build completed. Checking dist directory:"
        Get-ChildItem dist\StampZ-III

    - name: Download VC++ Redistributable
      run: |
        New-Item -Path "dist\StampZ-III\vcredist" -ItemType Directory -Force
        $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
        $output = "dist\StampZ-III\vcredist\vc_redist.x64.exe"
        try {
            Invoke-WebRequest -Uri $url -OutFile $output
            Write-Host "Downloaded VC++ Redistributable"
        } catch {
            Write-Host "Could not download VC++ Redistributable: $_"
        }

    - name: Install Inno Setup
      run: choco install innosetup -y --no-progress

    - name: Build installer with Inno Setup
      run: |
        ISCC stampz_installer.iss
        $installer = Get-Item "dist\StampZ-III-*-Setup.exe"
        Write-Host "Installer created: $($installer.Name) ($([math]::Round($installer.Length / 1MB, 1)) MB)"

    - name: Upload installer to release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $installer = (Get-Item "dist\StampZ-III-*-Setup.exe").FullName
        gh release upload "${{ needs.setup-release.outputs.tag }}" "$installer" --repo ${{ github.repository }}
        Write-Host "Uploaded: $installer"

  build-linux:
    needs: setup-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller tifffile

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --clean stampz.spec
        echo "Linux build completed. Checking dist directory:"
        ls -la dist/

    - name: Create Linux archive
      run: |
        cd dist
        echo "dist contents:"
        ls -la
        if [ -e "StampZ-III" ]; then
          tar -czf "StampZ-Linux-x64.tar.gz" "StampZ-III"
          echo "Archive created:"
          ls -lh StampZ-Linux-x64.tar.gz
        else
          echo "ERROR: dist/StampZ-III not found!"
          ls -la
          exit 1
        fi

    - name: Upload to release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload "${{ needs.setup-release.outputs.tag }}" dist/StampZ-Linux-x64.tar.gz --repo ${{ github.repository }}
        echo "Uploaded dist/StampZ-Linux-x64.tar.gz"

  build-macos:
    needs: setup-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller tifffile

    - name: Build macOS bundle
      run: python -m PyInstaller --clean --noconfirm stampz.spec

    - name: Create macOS archive
      run: |
        cd dist
        echo "dist contents:"
        ls -la
        if [ -d "StampZ-III.app" ]; then
          zip -r "StampZ-macOS-Universal.zip" "StampZ-III.app" -x "*.DS_Store"
          echo "Archive created:"
          ls -lh StampZ-macOS-Universal.zip
        else
          echo "ERROR: StampZ-III.app not found!"
          ls -la
          exit 1
        fi

    - name: Upload to release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload "${{ needs.setup-release.outputs.tag }}" dist/StampZ-macOS-Universal.zip --repo ${{ github.repository }}
        echo "Uploaded dist/StampZ-macOS-Universal.zip"

  finalize-release:
    needs: [setup-release, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Publish release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release edit "${{ needs.setup-release.outputs.tag }}" --draft=false --repo ${{ github.repository }}
        echo "Release published: https://github.com/${{ github.repository }}/releases/tag/${{ needs.setup-release.outputs.tag }}"
